<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1c242d">
  <meta name="description" content="SatContact — менеджер частот для радиолюбителей">
  <title>SatContact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header" id="header">
      <div class="header__top">
        <h1 class="header__title">SAT Навигатор</h1>
        <select class="group-select" id="groupSelect" aria-label="Группа">
          <option value="">Загрузка...</option>
        </select>
      </div>
      <div class="control-panel">
        <button type="button" class="btn btn--all" id="chipAll">ВСЕ</button>
        <input type="text" class="search-input" id="searchInput" placeholder="Поиск по частоте" autocomplete="off" inputmode="numeric">
        <button type="button" class="btn btn--toggle" id="toggleBandwidth" aria-pressed="false">Полоса</button>
        <button type="button" class="btn btn--toggle" id="toggleSensitivity" aria-pressed="false">Чувств.</button>
      </div>
      <div class="chip-scroll chip-row--satellites" id="chipRowSatellites">
        <!-- Сгенерируются в app.js -->
      </div>
      <div class="chip-scroll chip-row--bandwidth chip-row--collapsed" id="chipRowBandwidth">
        <!-- Сгенерируются в app.js -->
      </div>
      <div class="chip-scroll chip-row--sensitivity chip-row--collapsed" id="chipRowSensitivity">
        <button type="button" class="chip" data-category="sensitivity" data-filter="Чувствительный">Чувствительный</button>
        <button type="button" class="chip" data-category="sensitivity" data-filter="Средняя">Средняя</button>
        <button type="button" class="chip" data-category="sensitivity" data-filter="Тупой">Тупой</button>
      </div>
    </header>

    <main class="main">
      <div class="status-bar" id="statusBar">
        <span class="status-bar__text" id="statusText">Загрузка...</span>
      </div>
      <div class="card-list" id="cardList">
        <!-- Карточки генерируются в app.js -->
      </div>
      <div class="empty-state" id="emptyState" hidden>
        <p>Нет совпадений по запросу</p>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
