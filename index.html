<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <!-- GitHub Pages: base обязателен. Локально (file:// или другой порт) — закомментировать -->
  <base href="/satcontact/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1c242d">
  <meta name="description" content="SatContact — менеджер частот для радиолюбителей">
  <title>SatContact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header" id="header">
      <div class="header__top">
        <h1 class="header__title">SAT Навигатор</h1>
        <select class="group-select" id="groupSelect" aria-label="Группа">
          <option value="">Загрузка...</option>
        </select>
      </div>
      <div class="control-panel">
        <button type="button" class="btn btn--all" id="chipAll">ВСЕ</button>
        <input type="text" class="search-input" id="searchInput" placeholder="Поиск по частоте" autocomplete="off" inputmode="numeric">
        <button type="button" class="btn btn--toggle" id="toggleBandwidth" aria-pressed="false">Полоса</button>
        <button type="button" class="btn btn--toggle" id="toggleSensitivity" aria-pressed="false">Чувств.</button>
      </div>
      <div class="chip-scroll chip-row--satellites" id="chipRowSatellites">
        <!-- Сгенерируются в app.js -->
      </div>
      <div class="chip-scroll chip-row--bandwidth chip-row--collapsed" id="chipRowBandwidth">
        <!-- Сгенерируются в app.js -->
      </div>
      <div class="chip-scroll chip-row--sensitivity chip-row--collapsed" id="chipRowSensitivity">
        <button type="button" class="chip" data-category="sensitivity" data-filter="Чувствительный">Чувствительный</button>
        <button type="button" class="chip" data-category="sensitivity" data-filter="Средняя">Средняя</button>
        <button type="button" class="chip" data-category="sensitivity" data-filter="Тупой">Тупой</button>
      </div>
    </header>

    <main class="main">
      <div class="status-bar" id="statusBar">
        <span class="status-bar__text" id="statusText">Загрузка...</span>
      </div>
      <div class="card-list" id="cardList">
        <!-- Карточки генерируются в app.js -->
      </div>
      <div class="empty-state" id="emptyState" hidden>
        <p>Нет совпадений по запросу</p>
      </div>
    </main>

    <!-- Модуль 2: Интерактивная карта (SPA-переход) -->
    <div id="mapView" class="map-view" hidden>
      <header class="map-view__header">
        <button type="button" class="map-view__back" id="mapBack" aria-label="Назад">⬅ Назад</button>
        <h2 class="map-view__title" id="mapTitle">Карта</h2>
        <button type="button" class="map-view__all" id="mapShowAll">ВСЕ</button>
      </header>
      <div class="map-view__canvas" id="mapCanvas">
        <!-- D3-карта будет здесь -->
        <div class="map-view__loading" id="mapLoading">
          <div class="map-view__loading-status" id="mapLoadingStatus1">Поиск GPS…</div>
          <div class="map-view__loading-status" id="mapLoadingStatus2">Загрузка орбит…</div>
        </div>
        <div class="map-view__gps-denied" id="mapGpsDenied" hidden>
          <p class="map-view__gps-denied-text">GPS заблокирован. Разрешите доступ в браузере 🔒</p>
          <div class="map-view__gps-denied-btns">
            <button type="button" class="map-view__gps-btn" id="mapGpsRetry">Проверить снова</button>
            <button type="button" class="map-view__gps-btn" id="mapGpsContinue">Продолжить без GPS</button>
          </div>
        </div>
      </div>
      <div class="map-view__hud" id="mapHud">
        <div class="map-view__hud-row">
          <span>Азимут:</span>
          <span id="mapAzimuth">—</span>
        </div>
        <div class="map-view__hud-row">
          <span>Элевация:</span>
          <span id="mapElevation">—</span>
        </div>
        <div class="map-view__hud-row">
          <span>Дистанция:</span>
          <span id="mapDistance">—</span>
        </div>
        <div class="map-view__hud-row map-view__hud-coords">
          <span id="mapCoords">—</span>
          <button type="button" class="map-view__refresh" id="mapRefresh" aria-label="Обновить GPS">↻</button>
        </div>
      </div>
    </div>
  </div>

  <script src="lib/satellite.min.js"></script>
  <script src="lib/d3.min.js"></script>
  <script src="lib/topojson.min.js"></script>
  <script src="tle.js"></script>
  <script src="map.js"></script>
  <script src="map-render.js"></script>
  <script src="app.js"></script>
</body>
</html>
